name: Build music-dl CLI

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Target OS (windows, linux, darwin)'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - linux
          - darwin
          - all
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: windows
            arch: arm64
            ext: .exe
          - os: linux
            arch: amd64
            ext: ''
          - os: linux
            arch: arm64
            ext: ''
          - os: darwin
            arch: amd64
            ext: ''
          - os: darwin
            arch: arm64
            ext: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build music-dl
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "./dist/music-dl_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.ext }}" ./cmd/music-dl
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}

      - name: Verify binary
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            # Can't run Windows binary on Ubuntu, just check file exists
            test -f "./dist/music-dl_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.ext }}"
            file "./dist/music-dl_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.ext }}"
          else
            test -x "./dist/music-dl_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.ext }}"
            "./dist/music-dl_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.ext }}" --help > /dev/null
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-dl_${{ matrix.os }}_${{ matrix.arch }}
          path: ./dist/music-dl_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.ext }}
          if-no-files-found: error
